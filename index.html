<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Reference">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Reference">
  <meta name="theme-color" content="#102f2e">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Reference</title>
  <style>
    :root {
      --ink: #111b19;
      --muted: #5a6662;
      --bg: #f8f7f0;
      --panel: #ffffff;
      --line: #d8ded8;
      --deep: #102f2e;
      --deep2: #dcecea;
      --blue: #245b87;
      --blue2: #e8f0f7;
      --gold: #7a520d;
      --gold2: #fff2ce;
      --red: #8e352f;
      --red2: #f7e2df;
      --green: #35683e;
      --green2: #e3f0e1;
      --shadow: 0 8px 22px rgba(17, 27, 25, .08);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.42;
      letter-spacing: 0;
    }

    body {
      padding: 0 0 max(18px, env(safe-area-inset-bottom));
    }

    a { color: inherit; text-decoration: none; }
    button, select { font: inherit; }

    .app {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(248, 247, 240, .98);
      border-bottom: 1px solid var(--line);
      padding: max(10px, env(safe-area-inset-top)) 12px 10px;
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 10px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 21px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .hint {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .count {
      min-width: 76px;
      border-radius: 8px;
      padding: 8px 10px;
      background: var(--deep);
      color: #fff;
      text-align: center;
      font-size: 13px;
      font-weight: 900;
    }

    .day-controls {
      display: grid;
      grid-template-columns: 48px 1fr 48px;
      gap: 8px;
      align-items: center;
    }

    .nav,
    .primary,
    .secondary,
    .tab {
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 48px;
      background: var(--panel);
      color: var(--ink);
      font-weight: 900;
    }

    .nav {
      font-size: 24px;
      line-height: 1;
    }

    .nav:disabled,
    .primary:disabled {
      opacity: .35;
    }

    select {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 0 12px;
      font-weight: 900;
      appearance: none;
    }

    .strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 0 1px;
      scrollbar-width: none;
    }

    .strip::-webkit-scrollbar { display: none; }

    .chip {
      flex: 0 0 auto;
      min-width: 54px;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      display: grid;
      place-items: center;
    }

    .chip.active {
      color: #fff;
      background: var(--deep);
      border-color: var(--deep);
    }

    main {
      padding: 12px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .hero {
      padding: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbf7 100%);
    }

    .date {
      color: var(--blue);
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 7px;
    }

    h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .base {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
    }

    .pills {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .pill {
      padding: 7px 9px;
      border-radius: 8px;
      border: 1px solid #bcd4d0;
      background: var(--deep2);
      color: var(--deep);
      font-size: 12px;
      font-weight: 900;
    }

    .pill.warn {
      background: var(--gold2);
      border-color: #e7c875;
      color: var(--gold);
    }

    .section {
      padding: 14px;
      border-top: 1px solid var(--line);
    }

    .section:first-child { border-top: 0; }

    h3 {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      font-size: 16px;
      white-space: pre-line;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .primary,
    .secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 11px 12px;
    }

    .primary {
      background: var(--deep);
      color: #fff;
      border-color: var(--deep);
    }

    .secondary {
      background: var(--blue2);
      border-color: #bfd0de;
      color: #1d4162;
    }

    .checks {
      display: grid;
      gap: 10px;
    }

    .check {
      display: grid;
      grid-template-columns: 26px 1fr;
      gap: 10px;
      align-items: start;
      font-size: 16px;
    }

    .check input {
      width: 24px;
      height: 24px;
      margin: 0;
      accent-color: var(--green);
    }

    .check.done span {
      color: var(--muted);
      text-decoration: line-through;
    }

    .bottom {
      position: sticky;
      bottom: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px 12px max(10px, env(safe-area-inset-bottom));
      margin: 0 -12px -12px;
      border-top: 1px solid var(--line);
      background: rgba(248, 247, 240, .98);
      backdrop-filter: blur(14px);
    }
  </style>
  <style>
    .unlock {
      min-height: 100vh;
      max-width: 520px;
      margin: 0 auto;
      padding: max(34px, env(safe-area-inset-top)) 16px 24px;
      display: grid;
      align-content: center;
      gap: 14px;
    }
    .unlock-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .unlock-card h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    .unlock-card p {
      color: var(--muted);
      margin-bottom: 16px;
    }
    .refcode {
      width: 100%;
      min-height: 52px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      font: inherit;
      font-size: 18px;
      margin-bottom: 10px;
    }
    .error {
      color: var(--red);
      min-height: 22px;
      font-weight: 800;
      margin-top: 8px;
    }
    .app[hidden],
    .unlock[hidden] {
      display: none;
    }
  </style>
</head>
<body>
  <section class="unlock" id="unlock">
    <form class="unlock-card" id="unlockForm">
      <h1>Reference</h1>
      <p>Enter value to continue.</p>
      <input class="refcode" id="refcode" name="password" type="password" autocomplete="current-password" autocapitalize="none" spellcheck="false" placeholder="Value">
      <button class="primary" id="unlockBtn" type="submit">Continue</button>
      <div class="error" id="error"></div>
    </form>
  </section>

  <div class="app" id="app" hidden>
    <header class="top">
      <div class="brand">
        <div>
          <h1>Reference</h1>
          <div class="hint">Offline viewer</div>
        </div>
        <div class="count" id="count">Day 1</div>
      </div>
      <div class="day-controls">
        <button class="nav" id="prev" type="button">&lt;</button>
        <select id="select" aria-label="Select day"></select>
        <button class="nav" id="next" type="button">&gt;</button>
      </div>
      <div class="strip" id="strip"></div>
    </header>

    <main>
      <article class="card">
        <div class="hero">
          <div class="date" id="date"></div>
          <h2 id="title"></h2>
          <div class="base" id="base"></div>
          <div class="pills" id="pills"></div>
        </div>
        <section class="section"><h3>Plan</h3><p id="plan"></p><div class="buttons" id="links"></div></section>
        <section class="section"><h3>Sheet</h3><p id="sheet"></p></section>
        <section class="section"><h3>Ideas</h3><p id="ideas"></p></section>
        <section class="section"><h3>Move</h3><p id="move"></p></section>
        <section class="section"><h3>Info</h3><p id="info"></p></section>
        <section class="section"><h3>Food</h3><p id="food"></p></section>
        <section class="section"><h3>Checklist</h3><div class="checks" id="checks"></div></section>
      </article>

      <div class="bottom">
        <button class="secondary" id="prevBottom" type="button">Previous</button>
        <button class="primary" id="nextBottom" type="button">Next day</button>
      </div>
    </main>
  </div>

    };

    function b64ToBytes(value) {
      const raw = atob(value);
      const bytes = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
      return bytes;
    }
    function utf8(value) {
      return new TextEncoder().encode(value);
    }
    async function openBundle(value) {
      const keyMaterial = await crypto.subtle.importKey("raw", utf8(value), "PBKDF2", false, ["deriveKey"]);
      const key = await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(bundleData.salt), iterations: bundleData.iterations, hash: "SHA-256" },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
      const decrypted = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: b64ToBytes(bundleData.iv) },
        key,
        b64ToBytes(bundleData.data)
      );
      return JSON.parse(new TextDecoder().decode(decrypted));
    }

    let days = [];
    let sheetText = {};
    let dailyIdeas = {};
    let current = 0;
    let els;

    function storeGet(key) { try { return localStorage.getItem(key); } catch (e) { return null; } }
    function storeSet(key, value) { try { localStorage.setItem(key, value); } catch (e) {} }
    function nice(iso) {
      const d = new Date(iso + "T00:00:00");
      return d.toLocaleDateString("en", { month: "short", day: "numeric" });
    }
    function initialIndex() {
      const hash = location.hash.replace("#day-", "");
      const byHash = days.findIndex(d => d[0] === hash);
      if (byHash >= 0) return byHash;
      const saved = Number(storeGet("daily-note-index-v1"));
      return Number.isFinite(saved) && saved >= 0 && saved < days.length ? saved : 0;
    }
    function bindEls() {
      els = {
        count: document.getElementById("count"),
        select: document.getElementById("select"),
        strip: document.getElementById("strip"),
        prev: document.getElementById("prev"),
        next: document.getElementById("next"),
        prevBottom: document.getElementById("prevBottom"),
        nextBottom: document.getElementById("nextBottom"),
        date: document.getElementById("date"),
        title: document.getElementById("title"),
        base: document.getElementById("base"),
        pills: document.getElementById("pills"),
        plan: document.getElementById("plan"),
        sheet: document.getElementById("sheet"),
        ideas: document.getElementById("ideas"),
        move: document.getElementById("move"),
        info: document.getElementById("info"),
        food: document.getElementById("food"),
        links: document.getElementById("links"),
        checks: document.getElementById("checks")
      };
    }
    function setup() {
      bindEls();
      els.select.innerHTML = days.map((d, i) => '<option value="' + i + '">' + nice(d[0]) + ' ' + d[1] + ' - ' + d[2] + '</option>').join("");
      els.strip.innerHTML = days.map((d, i) => '<button class="chip" type="button" data-index="' + i + '">' + nice(d[0]).replace(" ", "<br>") + '</button>').join("");
      els.strip.querySelectorAll("button").forEach(b => b.addEventListener("click", () => setDay(Number(b.dataset.index))));
      els.select.addEventListener("change", e => setDay(Number(e.target.value)));
      els.prev.addEventListener("click", () => setDay(current - 1));
      els.next.addEventListener("click", () => setDay(current + 1));
      els.prevBottom.addEventListener("click", () => setDay(current - 1));
      els.nextBottom.addEventListener("click", () => setDay(current + 1));
    }
    function setDay(i) {
      current = Math.max(0, Math.min(days.length - 1, i));
      storeSet("daily-note-index-v1", String(current));
      history.replaceState(null, "", "#day-" + days[current][0]);
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
    function render() {
      const d = days[current];
      const [iso,dow,base,title,status,plan,move,info,food,checks,links] = d;
      els.count.textContent = 'Day ' + (current + 1) + ' / ' + days.length;
      els.select.value = String(current);
      els.date.textContent = nice(iso) + ' 2026 - ' + dow;
      els.title.textContent = title;
      els.base.textContent = base;
      els.pills.innerHTML = status.map(s => '<span class="pill ' + (/open|confirm|weather|closure|choose/i.test(s) ? "warn" : "") + '">' + s + '</span>').join("");
      els.plan.textContent = plan;
      els.sheet.textContent = sheetText[iso] || "No worksheet detail.";
      els.ideas.textContent = dailyIdeas[iso] || "No extra ideas.";
      els.move.textContent = move;
      els.info.textContent = info;
      els.food.textContent = food;
      els.links.innerHTML = links.map((l, i) => '<a class="' + (i === 0 ? "primary" : "secondary") + '" href="' + l[1] + '">' + l[0] + '</a>').join("");
      els.checks.innerHTML = checks.map(text => {
        const key = 'daily-note-v1:' + iso + ':' + text;
        const checked = storeGet(key) === "1";
        return '<label class="check ' + (checked ? "done" : "") + '"><input type="checkbox" data-key="' + key + '" ' + (checked ? "checked" : "") + '><span>' + text + '</span></label>';
      }).join("");
      els.checks.querySelectorAll("input").forEach(input => {
        input.addEventListener("change", () => {
          storeSet(input.dataset.key, input.checked ? "1" : "0");
          input.closest(".check").classList.toggle("done", input.checked);
        });
      });
      els.strip.querySelectorAll("button").forEach((b, i) => b.classList.toggle("active", i === current));
      els.prev.disabled = current === 0;
      els.prevBottom.disabled = current === 0;
      els.next.disabled = current === days.length - 1;
      els.nextBottom.disabled = current === days.length - 1;
    }
    async function unlock() {
      const error = document.getElementById("error");
      const input = document.getElementById("refcode");
      const value = input.value.trim();
      error.textContent = "";
      if (!value) {
        error.textContent = "Enter the value.";
        return;
      }
      try {
        const data = await openBundle(value);
        days = data.days;
        sheetText = data.sheetText || {};
        dailyIdeas = data.dailyIdeas || {};
        document.getElementById("unlock").hidden = true;
        document.getElementById("app").hidden = false;
        current = initialIndex();
        setup();
        render();
      } catch (e) {
        error.textContent = "Could not open these notes.";
      }
    }
    document.getElementById("unlockForm").addEventListener("submit", (event) => {
      event.preventDefault();
      unlock();
    });
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
